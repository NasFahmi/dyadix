trading:
  pairs:
    - BTCUSDT
    # - ETHUSDT
    # - SOLUSDT
    # - XRPUSDT
    # - HYPEUSDT
    # - ADAUSDT
    # - ARBUSDT
  correlation_pairs:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
    - HYPEUSDT
    - ADAUSDT
    - ARBUSDT
  active_session: "london_ny" # marker untuk logic session
  timeframes:
    - "3m"
    - "5m"
    - "15m"
    - "1h"
    - "1d"

llm:
  provider: "local" # groq, gemini, local
  model: "llama-open-finance-8b" # default model

  temperature: 0.25
  max_tokens: 1100

  # Model khusus per fungsi (override via env: NEWS_SOCIAL_ANALYSIS_MODEL, DECISION_LLM_MODEL)
  news_social_model: "llama-open-finance-8b"
  decision_model: "llama-open-finance-8b:2"
