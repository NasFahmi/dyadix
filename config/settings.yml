trading:
  pairs:
    - BTCUSDT
    - SOLUSDT
    - ETHUSDT
    - XRPUSDT
  correlation_pairs:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
  active_session: "ny" # Opsi: "all", "ny", "london", "asia", "asia_london", "london_ny", "asia_ny"
  timeframes:
    - "3m"
    - "5m"
    - "15m"
    - "1h"
    - "1d"

llm:
  temperature: 0.25
  max_tokens: 1100

scheduler:
  tick_interval: 60 # detik, main loop tick
  intervals:
    ohlcv_fast: 60 # M3 & M5 OHLCV (detik)
    ohlcv_m15: 90 # M15 OHLCV
    ohlcv_h1: 180 # H1 OHLCV (3 menit)
    ohlcv_daily: 3600 # Daily OHLCV (1 jam)
    funding_rate: 60 # Funding Rate
    open_interest: 120 # Open Interest (2 menit)
    correlation: 120 # Correlation (2 menit)
    sentiment: 1200 # Sentiment/News/Social (15 menit)

signal_detector:
  min_confidence: 0.40 # Threshold minimum untuk memanggil LLM
  divergence_threshold: 0.15 # Minimum difference between bullish and bearish scores
  cooldown_seconds: 1200 # 15 menit cooldown per pair setelah LLM call

database:
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30

features:
  enable_reddit_scraper: false # Set to true to enable Reddit scraping

exchange:
  provider: "binance"
  # Testnet dikontrol via .env: BINANCE_TESTNET=true / false

risk_management:
  risk_per_trade_pct: 1.0 # % modal yang di-risk per trade
  leverage: 10 # Leverage Binance Futures (ubah sesuai toleransi risiko)
  max_running_trades: 1 # Maksimal 1 trade aktif bersamaan per pair

  # ───────────────────────────────────────────────────────────────
  # CONTOH KALKULASI RISK (panduan penyesuaian):
  #
  # Asumsikan:
  #   Modal akun (USDT balance) : $200
  #   risk_per_trade_pct        : 1.0%  → Risk dollar = $200 x 1% = $2
  #   leverage                  : 10x
  #   Pair                      : BTCUSDT @ $95,000
  #
  # Langkah kalkulasi quantity:
  #   1. Nominal posisi = Risk x Leverage = $2 x 10 = $20
  #   2. Quantity (BTC) = $20 / $95,000  ≈ 0.00021 BTC
  #
  # Artinya: Dengan $200 modal dan leverage 10x,
  #   bot hanya mempertaruhkan $2 (1%) per trade,
  #   membuka posisi senilai $20 nominal.
  #
  # Jika leverage dinaikkan ke 20x:
  #   Nominal posisi = $2 x 20 = $40
  #   Quantity (BTC) = $40 / $95,000   ≈ 0.00042 BTC
  #   → Potensi PnL lebih besar, RISK TETAP $2
  #
  # Rekomendasi umum:
  #   risk_per_trade_pct : 0.5 - 1.0%
  #   leverage           : 5x - 10x
  # ───────────────────────────────────────────────────────────────

autopsy:
  enabled: true
  notify_telegram: true
  min_loss_usd: 1.0 # Jalankan autopsy hanya jika loss >= $1
